# .github/workflows/coleta.yml
# DUOPEN 2026 — Pipeline de coleta automática de dados
#
# Executa todo dia às 3h BRT (06:00 UTC)
# Pode ser disparado manualmente pelo painel do GitHub
#
# Secrets necessários (Settings > Secrets and variables > Actions):
#   SUPABASE_URL              URL do projeto Supabase
#   SUPABASE_KEY              Chave service_role do Supabase
#   TCE_RJ_TOKEN              Token de autenticação do TCE-RJ (opcional — API é pública)
#   IBGE_MUNICIPIO_CODE       Código IBGE de Macaé em 7 dígitos (3302403)
#   SISMOB_MUNICIPIO_CODE     Código IBGE de Macaé em 6 dígitos (330240)

name: Coleta de dados

on:
  schedule:
    - cron: "0 6 * * *"   # 03:00 BRT = 06:00 UTC, todo dia
  workflow_dispatch:        # disparo manual pelo painel do GitHub
    inputs:
      fonte:
        description: "Fonte específica (vazio = todas)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - portal_macae
          - painel_legado
          - painel_atual
          - egim
          - tce_rj
          - tce_licitacoes
          - ibge
          - sismob
          - sinapi
          - transferegov
          - transparencia_convenios

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  # ── Secrets ──────────────────────────────────────────────────────────────────
  SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
  TCE_RJ_TOKEN:          ${{ secrets.TCE_RJ_TOKEN }}
  IBGE_MUNICIPIO_CODE:   ${{ secrets.IBGE_MUNICIPIO_CODE }}
  SISMOB_MUNICIPIO_CODE: ${{ secrets.SISMOB_MUNICIPIO_CODE }}

  # ── Valores padrão (sobrescreva via secret se o ambiente for diferente) ───────
  MACAE_TRANSPARENCIA_URL:              "https://transparencia.macae.rj.gov.br"
  IBGE_UF_CODE:                         "33"
  TCE_RJ_MUNICIPIO:                     "macae"
  TCE_RJ_PAGE_SIZE:                     "1000"
  TCE_RJ_MAX_PAGES:                     "100"
  TCE_RJ_RETRY_ATTEMPTS:                "3"
  TCE_RJ_RETRY_BACKOFF:                 "2.0"
  TCE_RJ_REQUEST_TIMEOUT:               "30"
  CHROME_HEADLESS:                      "True"
  CHROME_NO_SANDBOX:                    "True"
  PAINEL_LEGADO_LOCALIDADE:             "Macaé/RJ"
  PAINEL_LEGADO_LOCALIDADE_COMPLEMENTAR: "Macae/RJ"
  PAINEL_LEGADO_WAIT_TIMEOUT:           "60"
  PAINEL_LEGADO_QUIET_WAIT_MS:          "8000"
  PAINEL_LEGADO_PAGE_SIZE:              "200"
  EGIM_MAP_ID:                          "1tu5J6jl4n2xcg2A_uMpThe7H2E07nYc"
  LOG_LEVEL:                            "INFO"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Testes — garante que nenhum scraper quebrado vai pro banco
  # ─────────────────────────────────────────────────────────────────────────────
  testes:
    name: Testes e cobertura
    runs-on: ubuntu-latest
    environment: secrets

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências de sistema (lxml + Chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libxml2-dev libxslt1-dev zlib1g-dev
          # Chrome para Selenium (portal_macae, painel_legado, painel_atual)
          sudo install -d -m 0755 /etc/apt/keyrings
          wget -q -O- https://dl-ssl.google.com/linux/linux_signing_key.pub \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/google-chrome.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Testes unitários com cobertura
        run: |
          python -m pytest \
            tests/ \
            --ignore=tests/integration \
            --cov=etl \
            --cov=scrappers \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Testes de integração
        run: python -m pytest tests/integration -v


  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Coleta e ETL — só roda se todos os testes passarem
  # ─────────────────────────────────────────────────────────────────────────────
  coleta:
    name: Coleta e ETL
    runs-on: ubuntu-latest
    needs: testes
    environment: secrets

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências de sistema (lxml + Chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libxml2-dev libxslt1-dev zlib1g-dev
          sudo install -d -m 0755 /etc/apt/keyrings
          wget -q -O- https://dl-ssl.google.com/linux/linux_signing_key.pub \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/google-chrome.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      # ── Diagnóstico do Chrome ──────────────────────────────────────────────────
      # Smoke test do Selenium: se falhar aqui, os scrapers Selenium não vão
      # coletar nada. NÃO usa continue-on-error para que o erro fique visível.
      - name: "Diagnóstico — Chrome + Selenium smoke test"
        run: |
          echo "Chrome: $(google-chrome-stable --version 2>&1 || echo 'NÃO INSTALADO')"
          python - <<'PY'
          import sys
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          opts = webdriver.ChromeOptions()
          for a in ("--headless=new","--no-sandbox","--disable-dev-shm-usage",
                    "--disable-gpu","--window-size=1920,1080"):
              opts.add_argument(a)
          try:
              drv = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
              drv.get("data:text/html,<h1>ok</h1>")
              titulo = drv.find_element("tag name", "h1").text
              drv.quit()
              print(f"Selenium smoke test OK — render='{titulo}'")
          except Exception as e:
              print(f"Selenium smoke test FALHOU: {type(e).__name__}: {e}", file=sys.stderr)
              sys.exit(1)
          PY

      # ── Scrapers ─────────────────────────────────────────────────────────────

      - name: "Scraper — Transparência de Macaé (Selenium)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'portal_macae' }}
        run: python scrappers/macae/portal_macae.py
        continue-on-error: true

      - name: "Scraper — Painel de Obras Legado (Selenium)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'painel_legado' }}
        run: python scrappers/macae/painel_legado.py
        continue-on-error: true

      - name: "Scraper — Painel de Obras Atual"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'painel_atual' }}
        run: python scrappers/macae/painel_atual.py
        continue-on-error: true

      - name: "Scraper — EGIM (obras georreferenciadas KML)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'egim' }}
        run: python scrappers/macae/egim.py
        continue-on-error: true

      - name: "Scraper — TCE-RJ (contratos, aditivos, obras paralisadas)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'tce_rj' }}
        run: python scrappers/tce/tce_rj.py
        continue-on-error: true

      - name: "Scraper — TCE-RJ Licitações (feature engineering de fornecedores)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'tce_licitacoes' }}
        run: python scrappers/tce/tce_licitacoes.py
        continue-on-error: true

      - name: "Scraper — IBGE (geodados + GeoJSON Macaé)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'ibge' }}
        run: python scrappers/ibge/ibge.py
        continue-on-error: true

      - name: "Scraper — SISMOB (obras de saúde federais)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'sismob' }}
        run: python scrappers/federal/sismob.py
        continue-on-error: true

      - name: "Scraper — SINAPI/CUB (custos de referência por m²)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'sinapi' }}
        run: python scrappers/federal/sinapi.py
        continue-on-error: true

      - name: "Scraper — TransfereGov/SICONV (aditivos por convênio federal)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'transferegov' }}
        run: python scrappers/federal/transferegov.py
        continue-on-error: true

      - name: "Scraper — Portal da Transparência (convênios federais + data de conclusão)"
        if: ${{ github.event.inputs.fonte == '' || github.event.inputs.fonte == 'transparencia_convenios' }}
        run: python scrappers/federal/transparencia_convenios.py
        continue-on-error: true

      # ── ETL ──────────────────────────────────────────────────────────────────
      # pipeline.py lê todos os caches gerados acima, aplica clean → compress
      # e faz upsert em lote no Supabase. Falha individual por dataset não
      # cancela os demais — só retorna código 1 se TODOS falharem.

      - name: "ETL — Limpeza, compressão e carga no Supabase"
        run: python pipeline.py

      - name: "ETL — Transformação Raw → Estruturada"
        run: python -m etl.transformer
        continue-on-error: true

      # ── Resumo ────────────────────────────────────────────────────────────────

      - name: Resumo da execução
        if: always()
        run: |
          echo "## Pipeline de coleta" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Artefatos (coverage/logs/cache) estao desativados temporariamente por compatibilidade do runtime Node.js da action upload-artifact. Reativar quando ela migrar para Node 24." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Data | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.fonte }}" ]; then
            echo "| Fonte selecionada | ${{ github.event.inputs.fonte }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # Contagem de registros por cache + destaque de datasets ausentes
          python - <<'PY' >> $GITHUB_STEP_SUMMARY
          import json
          from pathlib import Path

          cache = Path("cache")
          # Todos os datasets que uma coleta completa deve gerar, com a
          # tecnologia entre parênteses para diagnóstico mais rápido.
          esperados = {
              "portal_macae_contratos.json":  "Selenium",
              "portal_macae_licitacoes.json": "Selenium",
              "painel_atual.json":            "Selenium",
              "painel_legado_obras.json":     "Selenium",
              "egim.json":                    "KML",
              "tce_rj_contratos.json":        "REST",
              "tce_rj_obras.json":            "REST",
              "tce_rj_aditivos.json":         "REST",
              "tce_contratos.json":           "REST",
              "tce_licitacoes.json":          "REST",
              "tce_perfil_fornecedores.json": "REST",
              "sismob.json":                  "REST",
              "ibge_metadados.json":          "REST",
              "sinapi.json":                  "Embutida",
              "transferegov_aditivos.json":   "CSV federal",
              "transparencia_convenios.json": "REST",
          }
          print("### Caches gerados\n")
          print("| Arquivo | Registros |")
          print("|---|---|")
          presentes = set()
          for f in sorted(cache.glob("*.json")) if cache.is_dir() else []:
              presentes.add(f.name)
              try:
                  n = len(json.loads(f.read_text()))
              except Exception:
                  n = "?"
              print(f"| {f.name} | {n} |")

          ausentes = set(esperados) - presentes
          if ausentes:
              print("\n### ⚠️ Datasets esperados SEM cache (provável falha de coleta)\n")
              print("| Dataset | Tecnologia |")
              print("|---|---|")
              for a in sorted(ausentes):
                  print(f"| `{a}` | {esperados[a]} |")
          PY

      # ── Artefatos ─────────────────────────────────────────────────────────────


  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Notificação em caso de falha
  # ─────────────────────────────────────────────────────────────────────────────
  notificar-falha:
    name: Notificar falha
    runs-on: ubuntu-latest
    needs: [testes, coleta]
    if: failure()

    steps:
      - name: Resumo da falha
        run: |
          echo "## Falha no pipeline de coleta" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Data | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifique os logs em: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
